<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SautiLink — Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Bricolage Grotesque', sans-serif;
      background: linear-gradient(135deg, #ffffff, #f0f4ff, #fff8e6);
      color: #111;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 8%;
    }

    header img {
      height: 42px;
    }

    .brand {
      font-size: 1.6rem;
      font-weight: 800;
      color: #e11d48;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 50px 30px;
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .highlight-red { color: #e11d48; }
    .highlight-blue { color: #2563eb; }

    p {
      color: #444;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 1rem;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #2563eb, #e11d48);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .privacy {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #666;
    }

    #success {
      display: none;
      margin-top: 15px;
      color: #2563eb;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: #666;
    }

    .links {
      margin-bottom: 10px;
    }

    .links a {
      margin: 0 10px;
      text-decoration: none;
      color: #444;
      font-weight: 600;
    }

    .links a:hover {
      color: #2563eb;
    }
  </style>
</head>

<body>

  <header>
    <img src="assets/logo.svg" alt="SautiLink Logo">
    <div class="brand">SautiLink</div>
  </header>

  <main>
    <div class="card">
      <h1>
        <span class="highlight-red">Sauti</span><span class="highlight-blue">Link</span>
      </h1>

      <p>
        A privacy-first social network is coming soon.<br>
        Join the early waitlist and be among the first to experience it.
      </p>

      <form action="https://formspree.io/f/mqegqrya" method="POST">
        <input type="email" name="email" placeholder="Enter your email" required>
        <input type="text" name="username" placeholder="Choose a username" required>
        <button type="submit">Join Waitlist</button>
      </form>

      <div id="success">🚀 You're on the SautiLink early access list.</div>

      <div class="privacy">
        We respect your privacy. No spam. Ever.
      </div>
    </div>
  </main>

  <footer>
    <div class="links">
      <a href="#">Terms</a>
      <a href="#">Privacy</a>
      <a href="#">Contact</a>
      <a href="#">About</a>
    </div>
    © 2026 - SautiLink Corporation
  </footer>

  <script>
    const form = document.querySelector("form");
    const success = document.getElementById("success");

    form.addEventListener("submit", () => {
      success.style.display = "block";
    });
  </script>

</body>
</html>
