<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SautiLink - AI Challenges</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --red:#ff2d2d;
  --blue:#2d6bff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Bricolage Grotesque', sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* Background */
.bg{
  position:fixed;
  inset:0;
  background:url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a') center/cover no-repeat;
  filter:blur(18px) brightness(0.35);
  z-index:-1;
}

/* Layout */
.container{
  max-width:850px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

/* Logo */
.logo{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  font-size:28px;
  font-weight:700;
  color:var(--blue);
}

.logo img{
  width:45px;
}

/* Card */
.card{
  margin-top:30px;
  padding:25px;
  background:var(--card);
  border-radius:16px;
  backdrop-filter:blur(12px);
}

/* Title */
h1{
  font-size:30px;
  margin-bottom:10px;
}

p{
  opacity:0.8;
  line-height:1.6;
}

/* Button */
.btn{
  margin-top:20px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  color:white;
  background:linear-gradient(45deg,var(--red),var(--blue));
}

/* Challenge */
.challenge{
  margin-top:30px;
  padding:20px;
  background:var(--card);
  border-radius:16px;
  backdrop-filter:blur(10px);
  min-height:120px;
}

.challenge h3{
  color:var(--blue);
  margin-bottom:10px;
}

#text{
  font-size:15px;
  opacity:0.95;
  transition:0.3s;
}

/* Footer */
footer{
  margin-top:50px;
  font-size:13px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<!-- LOGO -->
<div class="logo">
  <img src="/assets/logo.svg" alt="logo">
  SautiLink AI
</div>

<!-- MAIN -->
<div class="card">
  <h1>Smart Challenge Engine</h1>
  <p>
    Every refresh generates a new AI-style challenge to keep your mind active while we build SautiLink.
  </p>

  <button class="btn" onclick="generateChallenge()">New Challenge</button>
</div>

<!-- CHALLENGE -->
<div class="challenge">
  <h3>Today's Prompt</h3>
  <div id="text">Loading intelligence...</div>
</div>

<footer>
© 2026 SautiLink Corporation. All rights reserved.
</footer>

</div>

<script>

/*
  AI-STYLE GENERATOR (NO API)
  - mixes topics + tones + intensity
  - simulates "thinking variation"
*/

const topics = [
  "free speech", "technology", "social media", "truth", "privacy",
  "AI future", "power of information", "digital identity", "online influence",
  "human behavior", "censorship", "internet freedom"
];

const actions = [
  "argue about", "explain", "challenge beliefs about", "imagine a world with",
  "defend", "critique", "rethink", "question deeply"
];

const tones = [
  "in one sentence", "as a bold statement", "like a viral post",
  "as a philosophical thought", "in a controversial way",
  "as if you're speaking to the world"
];

const extras = [
  "Make it powerful.",
  "Keep it short but meaningful.",
  "Make it thought-provoking.",
  "Make it sound like it could go viral.",
  "Make it extremely original.",
  "Make it feel like a headline."
];

function pick(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

// CORE AI SIMULATION
function generateChallenge(){
  let challenge =
    `Your task: ${pick(actions)} ${pick(topics)} ${pick(tones)}. ${pick(extras)}`;

  document.getElementById("text").innerText = challenge;
}

// auto generate on load
generateChallenge();

// auto refresh every 15 seconds (feels alive)
setInterval(generateChallenge, 15000);

</script>

</body>
</html>
