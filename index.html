<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SautiLink - Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --red:#ff2d2d;
  --blue:#2d6bff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Bricolage Grotesque', sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* Background */
.bg{
  position:fixed;
  inset:0;
  background:url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a') center/cover no-repeat;
  filter:blur(18px) brightness(0.35);
  z-index:-1;
}

/* Container */
.container{
  max-width:850px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

/* Logo */
.logo{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  font-size:28px;
  font-weight:700;
  color:var(--blue);
}

.logo img{
  width:45px;
}

/* Card */
.card{
  margin-top:30px;
  padding:25px;
  background:var(--card);
  border-radius:16px;
  backdrop-filter:blur(12px);
}

/* Main message */
h1{
  font-size:32px;
  margin-bottom:10px;
}

p{
  opacity:0.8;
  line-height:1.6;
}

/* Button */
.btn{
  margin-top:20px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  color:white;
  background:linear-gradient(45deg,var(--red),var(--blue));
}

/* Challenge box */
.challenge{
  margin-top:30px;
  padding:20px;
  background:var(--card);
  border-radius:16px;
  backdrop-filter:blur(10px);
}

.challenge h3{
  margin-bottom:10px;
  color:var(--blue);
}

.challenge p{
  font-size:14px;
  opacity:0.9;
}

/* Footer */
footer{
  margin-top:50px;
  font-size:13px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<!-- LOGO -->
<div class="logo">
  <img src="/assets/logo.svg" alt="logo">
  SautiLink
</div>

<!-- MAIN MESSAGE -->
<div class="card">
  <h1>Service Under Development</h1>
  <p>
    SautiLink is currently being built into a next-generation free speech platform.
    We are working hard to bring you a powerful, interactive social experience.
  </p>

  <button class="btn" onclick="refreshChallenge()">Refresh Experience</button>
</div>

<!-- CHALLENGE -->
<div class="challenge">
  <h3>Try This While You Wait</h3>
  <p id="challengeText">Loading challenge...</p>
</div>

<footer>
© 2026 SautiLink Corporation. All rights reserved.
</footer>

</div>

<script>

// Dynamic challenges (NO DATABASE - refresh = new experience)
const challenges = [
  "Think of one idea you would post if this platform was live right now.",
  "Write a one-line opinion about free speech.",
  "If you could ask AI anything, what would it be?",
  "Imagine a post that could go viral — what would it say?",
  "Describe your dream social network in one sentence.",
  "What is one problem social media should fix today?",
  "Write a powerful statement about truth and information.",
  "If you had 10 seconds of global attention, what would you say?"
];

// show random challenge
function loadChallenge(){
  let random = Math.floor(Math.random() * challenges.length);
  document.getElementById("challengeText").innerText = challenges[random];
}

// refresh button
function refreshChallenge(){
  loadChallenge();
}

// auto load on refresh
loadChallenge();

</script>

</body>
</html>
