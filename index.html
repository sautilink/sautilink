<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SautiLink — Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Bricolage Grotesque', sans-serif;
  background: linear-gradient(135deg, #ffffff, #eef2ff);
  color: #111;
  transition: 0.3s;
}

.dark {
  background: #0f172a;
  color: #e2e8f0;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 8%;
}

.brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-wrap img {
  height: 40px;
}

.brand {
  font-weight: 800;
  color: #e11d48;
}

.toggle {
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 20px;
  background: #2563eb;
  color: white;
  font-weight: bold;
}

main {
  text-align: center;
  padding: 40px 20px;
}

.card {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.dark .card {
  background: #1e293b;
}

h1 {
  font-size: 2.5rem;
}

.red { color: #e11d48; }
.blue { color: #2563eb; }

form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

input {
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #2563eb, #e11d48);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#success {
  display: none;
  margin-top: 15px;
  color: #22c55e;
}

.socials {
  margin-top: 25px;
}

.socials a {
  margin: 0 8px;
  font-size: 20px;
  text-decoration: none;
}

footer {
  text-align: center;
  padding: 30px;
  font-size: 0.9rem;
}

.links a {
  margin: 0 10px;
  text-decoration: none;
}

.donate {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <div class="brand-wrap">
    <img src="assets/logo.svg">
    <div class="brand">SautiLink</div>
  </div>
  <div class="toggle" onclick="toggleDark()">🌙 Dark</div>
</header>

<main>
  <div class="card">
    <h1><span class="red">Sauti</span><span class="blue">Link</span></h1>

    <p>
      A privacy-first social network is coming soon.<br>
      Join the early waitlist and be part of the future.
    </p>

    <form action="https://formspree.io/f/mqegqrya" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required>
      <input type="text" name="username" placeholder="Choose a username" required>
      <button type="submit">Join Waitlist</button>
    </form>

    <div id="success">🚀 You are on the early access list!</div>

    <div class="socials">
      <a href="#">📸</a>
      <a href="#">🐦</a>
      <a href="#">🎵</a>
      <a href="#">📘</a>
      <a href="#">💼</a>
      <a href="#">💬</a>
      <a href="#">🧵</a>
      <a href="#">▶️</a>
    </div>

    <div class="donate">
      💙 Support us: donate@sautilink.com
    </div>

  </div>
</main>

<footer>
  <div class="links">
    <a href="#">Terms</a>
    <a href="#">Privacy</a>
    <a href="#">Contact</a>
    <a href="#">About</a>
  </div>
  © 2026 - SautiLink Corporation
</footer>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}

const form = document.querySelector("form");
const success = document.getElementById("success");

form.addEventListener("submit", () => {
  success.style.display = "block";
});
</script>

</body>
</html>
