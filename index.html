<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SautiLink — Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Bricolage Grotesque', sans-serif;
  background: linear-gradient(135deg, #ffffff, #eef2ff);
  color: #111;
  transition: 0.3s;
}

.dark {
  background: #0f172a;
  color: #e2e8f0;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 8%;
}

.brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-wrap img {
  height: 40px;
}

.brand {
  font-weight: 800;
  color: #e11d48;
}

.toggle {
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 20px;
  background: #2563eb;
  color: white;
  font-weight: bold;
}

main {
  text-align: center;
  padding: 40px 20px;
}

.card {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.dark .card {
  background: #1e293b;
}

h1 {
  font-size: 2.5rem;
}

.red { color: #e11d48; }
.blue { color: #2563eb; }

form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

input {
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #2563eb, #e11d48);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#success {
  display: none;
  margin-top: 15px;
  color: #22c55e;
}

.socials {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 16px;
}

.socials a svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
  color: #444;
  transition: 0.3s;
}

.socials a:hover svg {
  color: #2563eb;
}

.dark .socials a svg {
  color: #cbd5f5;
}

footer {
  text-align: center;
  padding: 30px;
  font-size: 0.9rem;
}

.links a {
  margin: 0 10px;
  text-decoration: none;
  color: inherit;
}

.donate {
  margin-top: 20px;
}

.donate img {
  height: 26px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="brand-wrap">
    <img src="assets/logo.svg">
    <div class="brand">SautiLink</div>
  </div>
  <div class="toggle" onclick="toggleDark()">Dark</div>
</header>

<main>
  <div class="card">
    <h1><span class="red">Sauti</span><span class="blue">Link</span></h1>

    <p>
      A privacy-first social network is coming soon.<br>
      Join the early waitlist and be part of the future.
    </p>

    <form action="https://formspree.io/f/mqegqrya" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required>
      <input type="text" name="username" placeholder="Choose a username" required>
      <button type="submit">Join Waitlist</button>
    </form>

    <div id="success">You are on the early access list.</div>

    <div class="socials">
      <a href="https://linktr.ee/sautilink" target="_blank">
        <!-- Instagram -->
        <svg viewBox="0 0 24 24"><path d="M7 2C4 2 2 4 2 7v10c0 3 2 5 5 5h10c3 0 5-2 5-5V7c0-3-2-5-5-5H7zm5 5a5 5 0 110 10 5 5 0 010-10zm6-2a1 1 0 110 2 1 1 0 010-2z"/></svg>
      </a>

      <a href="https://linktr.ee/sautilink" target="_blank">
        <!-- X -->
        <svg viewBox="0 0 24 24"><path d="M3 3l18 18M21 3L3 21"/></svg>
      </a>

      <a href="https://linktr.ee/sautilink" target="_blank">
        <!-- TikTok -->
        <svg viewBox="0 0 24 24"><path d="M9 3v12a3 3 0 11-3-3"/></svg>
      </a>

      <a href="https://linktr.ee/sautilink" target="_blank">
        <!-- Facebook -->
        <svg viewBox="0 0 24 24"><path d="M14 9h3V6h-3c-2 0-4 2-4 4v2H7v3h3v7h3v-7h3l1-3h-4v-2c0-1 1-1 1-1z"/></svg>
      </a>

      <a href="https://linktr.ee/sautilink" target="_blank">
        <!-- LinkedIn -->
        <svg viewBox="0 0 24 24"><path d="M4 4h4v16H4zM6 2a2 2 0 110 4 2 2 0 010-4zm6 6h4v2h.1c.6-1 2-2 4-2 4 0 5 2 5 6v8h-4v-7c0-2 0-4-3-4s-3 2-3 4v7h-4z"/></svg>
      </a>

      <a href="https://linktr.ee/sautilink" target="_blank">
        <!-- YouTube -->
        <svg viewBox="0 0 24 24"><path d="M23 7s-1-3-4-3H5C2 4 1 7 1 7s-1 4-1 5 1 5 1 5 1 3 4 3h14c3 0 4-3 4-3s1-4 1-5-1-5-1-5zM10 15V9l6 3-6 3z"/></svg>
      </a>
    </div>

    <div class="donate">
      <a href="https://www.paypal.com/paypalme/donate@sautilink.com" target="_blank">
        <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" alt="PayPal">
      </a>
    </div>

  </div>
</main>

<footer>
  <div class="links">
    <a href="#">Terms</a>
    <a href="#">Privacy</a>
    <a href="#">Contact</a>
    <a href="#">About</a>
  </div>
  © 2026 - SautiLink Corporation
</footer>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}

const form = document.querySelector("form");
const success = document.getElementById("success");

form.addEventListener("submit", () => {
  success.style.display = "block";
});
</script>

</body>
</html>
