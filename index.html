<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SautiLink - Connect Your Voice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .logo-font { font-family: 'Bricolage Grotesque', sans-serif; }
    .feed-item { transition: all 0.2s ease; }
    .feed-item:hover { background-color: #1a1a1a; }
  </style>
</head>
<body class="bg-black text-white min-h-screen">

  <div class="flex max-w-7xl mx-auto min-h-screen">

    <!-- Desktop Left Sidebar -->
    <div class="w-20 lg:w-72 border-r border-zinc-800 flex flex-col hidden md:flex">
      <div class="p-6">
        <span class="logo-font text-4xl font-semibold tracking-tighter cursor-pointer" onclick="window.location.reload()">
          <span class="text-red-600">Sauti</span><span class="text-blue-500">Link</span>
        </span>
      </div>

      <nav class="flex-1 px-4 space-y-2">
        <a href="#" onclick="navigateTo('home')" class="flex items-center gap-5 px-6 py-4 text-xl font-medium hover:bg-zinc-900 rounded-3xl">
          <i class="fa-solid fa-house w-6"></i>
          <span class="hidden lg:block">Home</span>
        </a>
        <a href="#" onclick="navigateTo('explore')" class="flex items-center gap-5 px-6 py-4 text-xl font-medium hover:bg-zinc-900 rounded-3xl">
          <i class="fa-solid fa-magnifying-glass w-6"></i>
          <span class="hidden lg:block">Explore</span>
        </a>
        <a href="#" onclick="navigateTo('notifications')" class="flex items-center gap-5 px-6 py-4 text-xl font-medium hover:bg-zinc-900 rounded-3xl">
          <i class="fa-solid fa-bell w-6"></i>
          <span class="hidden lg:block">Notifications</span>
        </a>
        <a href="#" onclick="navigateTo('messages')" class="flex items-center gap-5 px-6 py-4 text-xl font-medium hover:bg-zinc-900 rounded-3xl">
          <i class="fa-solid fa-envelope w-6"></i>
          <span class="hidden lg:block">Messages</span>
        </a>
        <a href="#" onclick="navigateTo('profile')" class="flex items-center gap-5 px-6 py-4 text-xl font-medium hover:bg-zinc-900 rounded-3xl">
          <i class="fa-solid fa-user w-6"></i>
          <span class="hidden lg:block">Profile</span>
        </a>
      </nav>

      <div class="p-6">
        <button onclick="createPost()" 
                class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-4 rounded-3xl text-lg">
          Create Post
        </button>
      </div>

      <div class="px-6 pb-8 flex gap-3">
        <button onclick="showAuth('login')" class="flex-1 border border-zinc-700 hover:border-zinc-400 py-3 rounded-3xl font-semibold">Log in</button>
        <button onclick="showAuth('signup')" class="flex-1 bg-white text-black hover:bg-gray-200 py-3 rounded-3xl font-semibold">Sign up</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col w-full">
      <!-- Mobile Top Bar -->
      <div class="md:hidden border-b border-zinc-800 p-4 flex items-center justify-between bg-black sticky top-0 z-50">
        <span class="logo-font text-3xl font-semibold tracking-tighter">
          <span class="text-red-600">Sauti</span><span class="text-blue-500">Link</span>
        </span>
      </div>

      <!-- Desktop Header -->
      <div class="hidden md:block border-b border-zinc-800 p-5">
        <h1 class="text-2xl font-bold">Home</h1>
      </div>

      <!-- Compose Box -->
      <div class="border-b border-zinc-800 p-4 md:p-6">
        <div class="flex gap-4">
          <div class="w-10 h-10 md:w-12 md:h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full"></div>
          <div class="flex-1">
            <textarea id="postText" rows="3" 
                      class="w-full bg-transparent border-none focus:outline-none text-lg placeholder-zinc-500 resize-none" 
                      placeholder="What’s happening?"></textarea>
            <div class="flex justify-between items-center pt-4 border-t border-zinc-800">
              <i onclick="showToast()" class="fa-regular fa-image text-2xl text-blue-500 cursor-pointer"></i>
              <button onclick="fakePost()" 
                      class="bg-blue-600 hover:bg-blue-700 px-8 py-2 rounded-3xl font-bold">Post</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Feed -->
      <div class="flex-1 overflow-y-auto" id="feed"></div>

      <!-- Footer with Copyright -->
      <footer class="border-t border-zinc-800 bg-black py-8 px-6 text-sm text-zinc-500 mt-auto">
        <div class="max-w-7xl mx-auto">
          <!-- Social Media Icons -->
          <div class="flex justify-center gap-8 mb-8 text-2xl">
            <a href="https://linktr.ee/sautilink" target="_blank" class="hover:text-white transition"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="https://linktr.ee/sautilink" target="_blank" class="hover:text-white transition"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://linktr.ee/sautilink" target="_blank" class="hover:text-white transition"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://linktr.ee/sautilink" target="_blank" class="hover:text-white transition"><i class="fa-brands fa-tiktok"></i></a>
          </div>

          <!-- Footer Links -->
          <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-center mb-6">
            <a href="#" onclick="showToast('Privacy Policy - Coming soon')" class="hover:text-zinc-300">Privacy Policy</a>
            <a href="#" onclick="showToast('Terms of Service - Coming soon')" class="hover:text-zinc-300">Terms of Service</a>
            <a href="#" onclick="showToast('Help Center - Coming soon')" class="hover:text-zinc-300">Help Center</a>
            <a href="#" onclick="showToast('Contacts - Coming soon')" class="hover:text-zinc-300">Contacts</a>
            <a href="#" onclick="showToast('Report a problem - Coming soon')" class="hover:text-zinc-300">Report</a>
          </div>

          <!-- Copyright -->
          <div class="text-center text-xs">
            Copyright © 2026 SautiLink Corporation. All rights reserved.
          </div>
        </div>
      </footer>
    </div>

    <!-- Right Sidebar -->
    <div class="w-80 hidden xl:block border-l border-zinc-800 p-6">
      <div class="bg-zinc-900 rounded-3xl p-6">
        <h2 class="font-bold text-xl mb-4">Trending now</h2>
        <div class="space-y-4">
          <div class="hover:bg-zinc-800 p-3 rounded-2xl cursor-pointer">
            <p class="text-blue-400">#SautiLink</p>
            <p class="font-medium">Trending in East Africa • 24.8K posts</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation - Mobile Only -->
  <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-800 z-50 md:hidden">
    <div class="flex justify-around py-3">
      <a href="#" onclick="navigateTo('home')" class="text-blue-500"><i class="fa-solid fa-house text-3xl"></i></a>
      <a href="#" onclick="navigateTo('explore')" class="text-zinc-400"><i class="fa-solid fa-magnifying-glass text-3xl"></i></a>
      <a href="#" onclick="createPost()" class="-mt-9">
        <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center shadow-2xl border-4 border-black">
          <i class="fa-solid fa-plus text-4xl"></i>
        </div>
      </a>
      <a href="#" onclick="navigateTo('notifications')" class="text-zinc-400"><i class="fa-solid fa-bell text-3xl"></i></a>
      <a href="#" onclick="navigateTo('profile')" class="text-zinc-400"><i class="fa-solid fa-user text-3xl"></i></a>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div id="postModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 w-full max-w-lg mx-4 rounded-3xl p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Create Post</h2>
        <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-white">&times;</button>
      </div>
      <textarea id="modalText" rows="6" class="w-full bg-zinc-800 rounded-2xl p-5 text-lg focus:outline-none" placeholder="What do you want to share?"></textarea>
      <div class="flex justify-end gap-4 mt-6">
        <button onclick="closeModal()" class="px-6 py-2 text-zinc-400">Cancel</button>
        <button onclick="fakePostFromModal()" class="bg-blue-600 hover:bg-blue-700 px-8 py-2 rounded-3xl font-bold">Post</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 border border-zinc-700 px-6 py-4 rounded-3xl shadow-2xl z-[110]">
    <span id="toastText" class="font-medium"></span>
  </div>

  <script>
    function renderFeed() {
      const feed = document.getElementById('feed');
      feed.innerHTML = `
        <div class="feed-item border-b border-zinc-800 p-6">
          <div class="flex gap-4">
            <div class="w-11 h-11 bg-gradient-to-br from-red-500 to-blue-600 rounded-full flex-shrink-0"></div>
            <div class="flex-1">
              <div class="flex items-center gap-2">
                <span class="font-bold">Sauti Community</span>
                <span class="text-blue-500">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
                <span class="text-zinc-500">@sautilink • 1h</span>
              </div>
              <p class="mt-3 text-[17px] leading-relaxed">
                Welcome to SautiLink - The platform where Tanzanians can raise their voices for justice, freedom, transparency, and equality. 
                A 100% free speech platform shaping the future of Tanzania.
              </p>
              <div class="flex justify-between mt-6 text-zinc-500">
                <button onclick="showToast()" class="flex items-center gap-2 hover:text-blue-400"><i class="fa-regular fa-comment"></i> 24</button>
                <button onclick="showToast()" class="flex items-center gap-2 hover:text-green-400"><i class="fa-solid fa-retweet"></i> 142</button>
                <button onclick="showToast()" class="flex items-center gap-2 hover:text-red-400"><i class="fa-regular fa-heart"></i> 892</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function createPost() {
      document.getElementById('postModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('postModal').classList.add('hidden');
    }

    function fakePost() {
      if (document.getElementById('postText').value.trim()) {
        showToast("Post submitted successfully (Demo mode)");
        document.getElementById('postText').value = '';
      } else {
        showToast("Write something first");
      }
    }

    function fakePostFromModal() {
      closeModal();
      showToast("Your post has been published!");
    }

    function showAuth(type) {
      showToast(type === 'login' ? "Login coming soon" : "Sign up coming soon");
    }

    function showToast(msg = "This feature is under construction") {
      const toast = document.getElementById('toast');
      document.getElementById('toastText').innerHTML = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 4000);
    }

    function navigateTo(page) {
      if (page === 'home') return;
      showToast(page.charAt(0).toUpperCase() + page.slice(1) + " is coming soon");
    }

    // Initialize
    window.onload = () => {
      renderFeed();
    };
  </script>
</body>
</html>
